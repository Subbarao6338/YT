name: Gradle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Build
      run: cmd.exe /c gradlew.bat assembleRelease -x lint

    - name: Sign
      run: cmd.exe /c java.exe -jar "signer\ApkSigner.jar" sign --key "signer\apkeasytool.pk8" --cert "signer\apkeasytool.pem"  --v4-signing-enabled false --out "%cd%/app/build/outputs/apk/release/youtube_pro_signed.apk" "%cd%/app/build/outputs/apk/release/app-release-unsigned.apk"
      
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
          name: YTPRO
          path: "app/build/outputs/apk/release/youtube_pro_signed.apk"
          retention-days: 5

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: "app/build/outputs/apk/release/youtube_pro_signed.apk"
        tag_name: v${{ github.run_number }}
        name: YTPRO v${{ github.run_number }}
        body: "Automated build of YTPRO."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
